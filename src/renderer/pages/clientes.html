<!-- CLIENTES -->
<div class="page-header">
  <div><h1>Clientes</h1><p>Registro y gestión de clientes</p></div>
  <button class="btn btn-primary" onclick="abrirModalCliente()">+ Nuevo Cliente</button>
</div>

<div class="toolbar">
  <div class="search-bar flex-1">
    <input type="text" id="cliBuscar" placeholder="Buscar por nombre, teléfono o ID..." />
  </div>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr><th>Nombre</th><th>Identificación</th><th>Teléfono</th><th>Email</th><th>Deuda</th><th></th></tr>
    </thead>
    <tbody id="tablaClientes"><tr><td colspan="6"><div class="spinner"></div></td></tr></tbody>
  </table>
</div>

<script data-page-init>
(async function() { await cargarClientes(); })();

async function cargarClientes() {
  const busqueda = document.getElementById('cliBuscar').value;
  const clientes = await api.clientes.obtenerTodos({ busqueda });
  const tbody = document.getElementById('tablaClientes');
  if (clientes.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="es-icon">👥</div><h3>Sin clientes registrados</h3></div></td></tr>`;
    return;
  }
  tbody.innerHTML = clientes.map(c => `
    <tr>
      <td class="font-semibold">${c.nombre}</td>
      <td class="text-muted">${c.identificacion||'-'}</td>
      <td class="text-muted">${c.telefono||'-'}</td>
      <td class="text-muted">${c.email||'-'}</td>
      <td class="${c.saldo_deuda>0?'text-danger font-bold':''}">${formatMoney(c.saldo_deuda)}</td>
      <td><div class="flex gap-2">
        <button class="btn btn-ghost btn-sm" onclick="verHistorialCliente(${c.id})">Historial</button>
        <button class="btn btn-ghost btn-sm" onclick="abrirModalCliente(${c.id})">Editar</button>
        ${c.saldo_deuda>0?`<button class="btn btn-success btn-sm" onclick="abrirModalPago(${c.id},'${c.nombre}',${c.saldo_deuda})">Pago</button>`:''}
        <button class="btn btn-ghost btn-sm text-danger" onclick="eliminarCliente(${c.id})">✕</button>
      </div></td>
    </tr>`).join('');
}

document.getElementById('cliBuscar').addEventListener('input', debounce(cargarClientes, 250));

// Cache de clientes para edición
let _clienteEditar = null;

function abrirModalCliente(id) {
  _clienteEditar = null;
  if (id) {
    const rows = document.querySelectorAll('#tablaClientes tr');
    // Se carga del campo de texto directamente si es para editar
  }
  const html = `
    <div class="form-row form-row-2">
      <div class="form-group"><label>Nombre *</label><input id="cliNombre" placeholder="Nombre completo"/></div>
      <div class="form-group"><label>Identificación</label><input id="cliId" placeholder="DNI, RUC, etc."/></div>
    </div>
    <div class="form-row form-row-2">
      <div class="form-group"><label>Teléfono</label><input id="cliTel" placeholder="+1 000 000 0000"/></div>
      <div class="form-group"><label>Email</label><input id="cliEmail" type="email" placeholder="correo@ejemplo.com"/></div>
    </div>
    <div class="form-group"><label>Dirección</label><input id="cliDir" placeholder="Dirección del cliente"/></div>
    <div class="form-group"><label>Notas</label><textarea id="cliNotas" rows="2"></textarea></div>`;

  abrirModal(id ? 'Editar Cliente' : 'Nuevo Cliente', html, {
    footer: `<button class="btn btn-ghost" onclick="cerrarModal()">Cancelar</button>
             <button class="btn btn-primary" onclick="guardarCliente(${id||'null'})">Guardar</button>`
  });

  // Si es edición, prellenar
  if (id) {
    api.clientes.obtenerTodos({}).then(lista => {
      const c = lista.find(x => x.id === id);
      if (!c) return;
      document.getElementById('cliNombre').value = c.nombre||'';
      document.getElementById('cliId').value = c.identificacion||'';
      document.getElementById('cliTel').value = c.telefono||'';
      document.getElementById('cliEmail').value = c.email||'';
      document.getElementById('cliDir').value = c.direccion||'';
      document.getElementById('cliNotas').value = c.notas||'';
    });
  }
}

async function guardarCliente(id) {
  const nombre = document.getElementById('cliNombre').value.trim();
  if (!nombre) { toast('El nombre es obligatorio', 'error'); return; }
  const c = {
    id, nombre,
    identificacion: document.getElementById('cliId').value,
    telefono: document.getElementById('cliTel').value,
    email: document.getElementById('cliEmail').value,
    direccion: document.getElementById('cliDir').value,
    notas: document.getElementById('cliNotas').value
  };
  try {
    if (id) await api.clientes.actualizarCliente(c);
    else await api.clientes.crearCliente(c);
    toast(id ? 'Cliente actualizado' : 'Cliente agregado', 'success');
    cerrarModal();
    cargarClientes();
  } catch(e) { toast(e.message, 'error'); }
}

async function eliminarCliente(id) {
  const ok = await confirm('¿Eliminar este cliente?');
  if (!ok) return;
  await api.clientes.eliminarCliente(id);
  toast('Cliente eliminado', 'success');
  cargarClientes();
}

async function verHistorialCliente(id) {
  const data = await api.clientes.obtenerHistorial(id);
  const c = data.cliente;
  abrirModal(`Historial de ${c.nombre}`, `
    <div class="flex gap-4 mb-4">
      <div class="card card-sm flex-1">
        <p class="text-muted text-sm">Total comprado</p>
        <p class="text-xl font-bold">${formatMoney(data.ventas.reduce((s,v)=>s+v.total,0))}</p>
      </div>
      <div class="card card-sm flex-1">
        <p class="text-muted text-sm">Deuda pendiente</p>
        <p class="text-xl font-bold ${c.saldo_deuda>0?'text-danger':''}">${formatMoney(c.saldo_deuda)}</p>
      </div>
      <div class="card card-sm flex-1">
        <p class="text-muted text-sm">Compras</p>
        <p class="text-xl font-bold">${data.ventas.length}</p>
      </div>
    </div>
    <h4 class="font-bold mb-3">Últimas compras</h4>
    ${data.ventas.length===0?'<p class="text-muted">Sin compras registradas.</p>':`
    <div class="table-wrap">
      <table><thead><tr><th>Número</th><th>Fecha</th><th>Total</th><th>Pagado</th><th>Estado</th></tr></thead>
        <tbody>${data.ventas.slice(0,10).map(v=>`<tr>
          <td>${v.numero}</td>
          <td class="text-muted text-sm">${formatDate(v.fecha)}</td>
          <td class="font-bold">${formatMoney(v.total)}</td>
          <td>${formatMoney(v.pagado)}</td>
          <td><span class="badge ${v.estado==='completada'?'badge-green':v.estado==='credito'?'badge-yellow':'badge-red'}">${v.estado}</span></td>
        </tr>`).join('')}</tbody>
      </table>
    </div>`}
    ${data.pagos.length>0?`
    <h4 class="font-bold mt-4 mb-3">Pagos registrados</h4>
    <div class="table-wrap"><table><thead><tr><th>Fecha</th><th>Monto</th><th>Notas</th></tr></thead>
      <tbody>${data.pagos.map(p=>`<tr>
        <td>${formatDate(p.fecha)}</td>
        <td class="text-success font-bold">${formatMoney(p.monto)}</td>
        <td class="text-muted">${p.notas||'-'}</td>
      </tr>`).join('')}</tbody></table></div>`:''}
  `, { size: 'lg' });
}

function abrirModalPago(clienteId, nombre, deuda) {
  abrirModal(`Registrar Pago — ${nombre}`, `
    <div class="alert alert-warning mb-4">Deuda pendiente: <strong>${formatMoney(deuda)}</strong></div>
    <div class="form-group"><label>Monto del pago *</label>
      <input id="pagoMonto" type="number" step="0.01" max="${deuda}" placeholder="0.00" /></div>
    <div class="form-group"><label>Notas</label><input id="pagoNotas" /></div>
  `, {
    footer: `<button class="btn btn-ghost" onclick="cerrarModal()">Cancelar</button>
             <button class="btn btn-success" onclick="registrarPago(${clienteId})">Registrar Pago</button>`
  });
}

async function registrarPago(clienteId) {
  const monto = parseFloat(document.getElementById('pagoMonto').value);
  if (!monto || monto <= 0) { toast('Ingresa un monto válido', 'error'); return; }
  await api.clientes.registrarPago({ cliente_id: clienteId, monto, notas: document.getElementById('pagoNotas').value });
  toast('Pago registrado correctamente', 'success');
  cerrarModal();
  cargarClientes();
}
</script>
