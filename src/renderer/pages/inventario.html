<!-- INVENTARIO -->
<div class="page-header">
  <div><h1>Inventario</h1><p>Gestión de productos y stock</p></div>
  <div class="flex gap-2">
    <button class="btn btn-ghost" onclick="abrirModalCategoria()">+ Categoría</button>
    <button class="btn btn-primary" onclick="abrirModalProducto()">+ Producto</button>
  </div>
</div>

<!-- Alertas stock bajo -->
<div id="alertaStock"></div>

<!-- Toolbar -->
<div class="toolbar">
  <div class="search-bar flex-1">
    <input type="text" id="invBuscar" placeholder="Buscar por nombre o código..." />
  </div>
  <select id="invCat" style="width:180px">
    <option value="">Todas las categorías</option>
  </select>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Código</th><th>Producto</th><th>Categoría</th>
        <th>P. Compra</th><th>P. Venta</th><th>Stock</th><th>Mínimo</th><th></th>
      </tr>
    </thead>
    <tbody id="tablaProductos"><tr><td colspan="8"><div class="spinner"></div></td></tr></tbody>
  </table>
</div>

<script data-page-init>
let productosInv = [];

(async function() {
  await Promise.all([cargarCategorias(), cargarProductos()]);
  verificarStockBajo();
})();

async function cargarCategorias() {
  const cats = await api.inventario.obtenerCategorias();
  const sel = document.getElementById('invCat');
  cats.forEach(c => sel.innerHTML += `<option value="${c.id}">${c.nombre}</option>`);
  window._catMap = Object.fromEntries(cats.map(c=>[c.id, c]));
}

async function cargarProductos() {
  const busqueda = document.getElementById('invBuscar').value;
  const categoria_id = document.getElementById('invCat').value || undefined;
  productosInv = await api.inventario.obtenerProductos({ busqueda, categoria_id });
  renderTablaProductos(productosInv);
}

function renderTablaProductos(lista) {
  const tbody = document.getElementById('tablaProductos');
  if (lista.length === 0) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="es-icon">📦</div><h3>Sin productos</h3><p>Crea tu primer producto</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = lista.map(p => `
    <tr>
      <td class="text-muted text-sm">${p.codigo||'-'}</td>
      <td class="font-semibold">${p.nombre}</td>
      <td><span class="badge badge-purple">${p.categoria_nombre||'Sin categoría'}</span></td>
      <td>${formatMoney(p.precio_compra)}</td>
      <td class="font-bold">${formatMoney(p.precio_venta)}</td>
      <td class="${p.stock <= p.stock_minimo ? 'text-danger font-bold' : ''}">${p.stock} ${p.unidad}</td>
      <td class="text-muted">${p.stock_minimo}</td>
      <td><div class="flex gap-2">
        <button class="btn btn-ghost btn-sm" onclick="abrirModalProducto(${p.id})">Editar</button>
        <button class="btn btn-ghost btn-sm text-danger" onclick="eliminarProducto(${p.id})">Eliminar</button>
      </div></td>
    </tr>`).join('');
}

async function verificarStockBajo() {
  const bajo = await api.inventario.stockBajo();
  const div = document.getElementById('alertaStock');
  if (bajo.length > 0)
    div.innerHTML = `<div class="alert alert-warning mb-4">⚠ ${bajo.length} producto(s) con stock bajo o agotado.</div>`;
}

document.getElementById('invBuscar').addEventListener('input', debounce(cargarProductos, 250));
document.getElementById('invCat').addEventListener('change', cargarProductos);

function abrirModalProducto(id) {
  const prod = id ? productosInv.find(p => p.id === id) : null;
  const cats = Object.values(window._catMap || {});
  const html = `
    <div class="form-row form-row-2">
      <div class="form-group"><label>Código</label>
        <input id="pCodigo" value="${prod?.codigo||''}" placeholder="Ej: P001" /></div>
      <div class="form-group"><label>Nombre *</label>
        <input id="pNombre" value="${prod?.nombre||''}" placeholder="Nombre del producto" /></div>
    </div>
    <div class="form-row form-row-2">
      <div class="form-group"><label>Precio de compra</label>
        <input id="pPrecioC" type="number" step="0.01" value="${prod?.precio_compra||0}" /></div>
      <div class="form-group"><label>Precio de venta *</label>
        <input id="pPrecioV" type="number" step="0.01" value="${prod?.precio_venta||0}" /></div>
    </div>
    <div class="form-row form-row-3">
      <div class="form-group"><label>Stock actual</label>
        <input id="pStock" type="number" step="0.01" value="${prod?.stock||0}" /></div>
      <div class="form-group"><label>Stock mínimo</label>
        <input id="pStockMin" type="number" step="0.01" value="${prod?.stock_minimo||5}" /></div>
      <div class="form-group"><label>Unidad</label>
        <input id="pUnidad" value="${prod?.unidad||'unidad'}" placeholder="unidad, kg, lt..." /></div>
    </div>
    <div class="form-row form-row-2">
      <div class="form-group"><label>Categoría</label>
        <select id="pCat">
          <option value="">Sin categoría</option>
          ${cats.map(c=>`<option value="${c.id}" ${prod?.categoria_id==c.id?'selected':''}>${c.nombre}</option>`).join('')}
        </select>
      </div>
      <div class="form-group"><label>Descripción</label>
        <input id="pDesc" value="${prod?.descripcion||''}" /></div>
    </div>`;

  abrirModal(prod ? 'Editar Producto' : 'Nuevo Producto', html, {
    footer: `
      <button class="btn btn-ghost" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarProducto(${id||'null'})">Guardar</button>`
  });
}

async function guardarProducto(id) {
  const nombre = document.getElementById('pNombre').value.trim();
  if (!nombre) { toast('El nombre es obligatorio', 'error'); return; }
  const prod = {
    id, codigo: document.getElementById('pCodigo').value,
    nombre, descripcion: document.getElementById('pDesc').value,
    categoria_id: document.getElementById('pCat').value || null,
    precio_compra: parseFloat(document.getElementById('pPrecioC').value) || 0,
    precio_venta: parseFloat(document.getElementById('pPrecioV').value) || 0,
    stock: parseFloat(document.getElementById('pStock').value) || 0,
    stock_minimo: parseFloat(document.getElementById('pStockMin').value) || 5,
    unidad: document.getElementById('pUnidad').value || 'unidad'
  };
  try {
    if (id) await api.inventario.actualizarProducto(prod);
    else await api.inventario.crearProducto(prod);
    toast(id ? 'Producto actualizado' : 'Producto creado', 'success');
    cerrarModal();
    await cargarProductos();
    verificarStockBajo();
  } catch(e) { toast(e.message, 'error'); }
}

async function eliminarProducto(id) {
  const ok = await confirm('¿Eliminar este producto del inventario?');
  if (!ok) return;
  await api.inventario.eliminarProducto(id);
  toast('Producto eliminado', 'success');
  cargarProductos();
}

function abrirModalCategoria() {
  abrirModal('Nueva Categoría', `
    <div class="form-group"><label>Nombre *</label><input id="catNombre" placeholder="Nombre de la categoría"/></div>
    <div class="form-group"><label>Descripción</label><input id="catDesc" /></div>
    <div class="form-group"><label>Color</label>
      <div class="color-options" id="catColores"></div>
      <input type="hidden" id="catColor" value="#6366f1"/>
    </div>`, {
    footer: `<button class="btn btn-ghost" onclick="cerrarModal()">Cancelar</button>
             <button class="btn btn-primary" onclick="guardarCategoria()">Guardar</button>`
  });

  const colores = ['#6366f1','#22c55e','#3b82f6','#f59e0b','#ec4899','#ef4444','#14b8a6','#8b5cf6'];
  const cont = document.getElementById('catColores');
  colores.forEach(c => {
    const d = document.createElement('div');
    d.className = 'color-dot' + (c==='#6366f1'?' selected':'');
    d.style.background = c;
    d.title = c;
    d.onclick = () => {
      cont.querySelectorAll('.color-dot').forEach(x=>x.classList.remove('selected'));
      d.classList.add('selected');
      document.getElementById('catColor').value = c;
    };
    cont.appendChild(d);
  });
}

async function guardarCategoria() {
  const nombre = document.getElementById('catNombre').value.trim();
  if (!nombre) { toast('El nombre es obligatorio', 'error'); return; }
  await api.inventario.crearCategoria({
    nombre,
    descripcion: document.getElementById('catDesc').value,
    color: document.getElementById('catColor').value
  });
  toast('Categoría creada', 'success');
  cerrarModal();
  await cargarCategorias();
}
</script>
